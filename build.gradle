import groovy.json.JsonOutput
import groovy.json.JsonSlurper

import org.gradle.api.file.DuplicatesStrategy

def findNpmExecutable() {
	if (System.properties['os.name'].toLowerCase().contains('windows')) {
		return 'npm.cmd'

	}
	return 'npm'
}

def findYarnExecutable() {
	if (System.properties['os.name'].toLowerCase().contains('windows')) {
		return 'yarn.cmd'

	}
	return 'yarn'
}

task generateBatchFiles (type: DefaultTask)

generateBatchFiles {
	group = 'build'
	description = 'Generates Liferay batch engine files from generation schemas and AI prompts.'

	doFirst {
		def batchDir = file("$rootDir/client-extensions/ai-commerce-accelerator-batch/batch")
		logger.lifecycle("Deleting old generated batch files in ${batchDir}")
		if (batchDir.exists()) {
			batchDir.eachFile {
				file ->
				if (file.name.contains("-object-entry-generation-schema-") || file.name.contains("-object-entry-ai-prompt-")) {
					logger.debug("Deleting ${file.name}")
					file.delete()

				}

			}

		}

	}

	doLast {
		def minifyJsonString = {
			jsonString ->
			def jsonObject = new groovy.json.JsonSlurper().parseText(jsonString)
			return groovy.json.JsonOutput.toJson(jsonObject)

		}

		def microserviceDir = file("$rootDir/client-extensions/ai-commerce-accelerator-microservice")
		def batchDir = file("$rootDir/client-extensions/ai-commerce-accelerator-batch/batch")

		def entities = ['account', 'order', 'pdf', 'pricing', 'product', 'warehouse'].sort()
		int fileIndex = 4

		// --- Schemas ---
		def schemaDir = file("$microserviceDir/generation-schemas")
		if (schemaDir.exists()) {
			entities.each {
				entity ->
				def inputFile = file("$schemaDir/${entity}.json")

				if (inputFile.exists()) {
					def entityName = entity.capitalize()
					def content = inputFile.text

					def batchJson = [
						configuration: [
							className: "com.liferay.object.rest.dto.v1_0.ObjectEntry",
							parameters: [
								containsHeaders: "true",
								createStrategy: "UPSERT",
								onErrorFail: "false",
								taskItemDelegateName: "C_AICommerceAcceleratorConfiguration",
								updateStrategy: "UPDATE"
							],
							taskItemDelegateName: "C_AICommerceAcceleratorConfiguration"
						],
						items: [
							[
								configKey: "ai-schema-${entity}",
								configStatus: [ key: "Active" ],
								configValue: minifyJsonString(content),
								description: "AI Schema for ${entityName}",
								externalReferenceCode: "AI-SCHEMA-${entity.toUpperCase()}"
							]
						]
					]

					def fileName = String.format("%02d-object-entry-ai-schema-%s.batch-engine-data.json", fileIndex++, entity)
					def outputFile = new File(batchDir, fileName)
					outputFile.withWriter('UTF-8') {
						writer ->
						writer.write(JsonOutput.prettyPrint(JsonOutput.toJson(batchJson)))

					}
					logger.lifecycle("Generated batch file: ${outputFile.name}")

				}

			}

		}

		// --- Prompts ---
		def promptDir = file("$microserviceDir/prompts")
		if (promptDir.exists()) {
			entities.each {
				entity ->
				def inputFile = file("$promptDir/${entity}.md")

				if (inputFile.exists()) {
					def entityName = entity.capitalize()
					def content = inputFile.text

					def batchJson = [
						configuration: [
							className: "com.liferay.object.rest.dto.v1_0.ObjectEntry",
							parameters: [
								containsHeaders: "true",
								createStrategy: "UPSERT",
								onErrorFail: "false",
								taskItemDelegateName: "C_AICommerceAcceleratorConfiguration",
								updateStrategy: "UPDATE"
							],
							taskItemDelegateName: "C_AICommerceAcceleratorConfiguration"
						],
						items: [
							[
								configKey: "ai-prompt-${entity}",
								configStatus: [ key: "Active" ],
								configValue: content,
								description: "AI Prompt for ${entityName}",
								externalReferenceCode: "AI-PROMPT-${entity.toUpperCase()}"
							]
						]
					]

					def fileName = String.format("%02d-object-entry-ai-prompt-%s.batch-engine-data.json", fileIndex++, entity)
					def outputFile = new File(batchDir, fileName)
					outputFile.withWriter('UTF-8') {
						writer ->
						writer.write(JsonOutput.prettyPrint(JsonOutput.toJson(batchJson)))

					}
					logger.lifecycle("Generated batch file: ${outputFile.name}")

				}

			}

		}

		// --- Categories ---
		def frontendConfigDir = file("$rootDir/client-extensions/ai-commerce-accelerator-frontend/src/config")
		if (frontendConfigDir.exists()) {
			def categoryFile = file("$frontendConfigDir/categories.json")
			if (categoryFile.exists()) {
				def content = categoryFile.text
				def configKey = "ai-categories" // New config key

				def batchJson = [
					configuration: [
						className: "com.liferay.object.rest.dto.v1_0.ObjectEntry",
						parameters: [
							containsHeaders: "true",
							createStrategy: "UPSERT",
							onErrorFail: "false",
							taskItemDelegateName: "C_AICommerceAcceleratorConfiguration",
							updateStrategy: "UPDATE"
						],
						taskItemDelegateName: "C_AICommerceAcceleratorConfiguration"
					],
					items: [
						[
							configKey: configKey,
							configStatus: [ key: "Active" ],
							configValue: minifyJsonString(content),
							description: "AI Product Categories",
							externalReferenceCode: "AI-CATEGORIES"
						]
					]
				]

				def fileName = String.format("%02d-object-entry-%s.batch-engine-data.json", fileIndex++, configKey)
				def outputFile = new File(batchDir, fileName)
				outputFile.withWriter('UTF-8') {
					writer ->
					writer.write(JsonOutput.prettyPrint(JsonOutput.toJson(batchJson)))

				}
				logger.lifecycle("Generated batch file: ${outputFile.name}")

			}

		}

		// --- AI Model Options ---
		def aiModelOptionsFile = file("$frontendConfigDir/ai-models.json")
		if (aiModelOptionsFile.exists()) {
			def content = aiModelOptionsFile.text
			def configKey = "ai-model-options"

			def batchJson = [
				configuration: [
					className: "com.liferay.object.rest.dto.v1_0.ObjectEntry",
					parameters: [
						containsHeaders: "true",
						createStrategy: "UPSERT",
						onErrorFail: "false",
						taskItemDelegateName: "C_AICommerceAcceleratorConfiguration",
						updateStrategy: "UPDATE"
					],
					taskItemDelegateName: "C_AICommerceAcceleratorConfiguration"
				],
				items: [
					[
						configKey: configKey,
						configStatus: [ key: "Active" ],
						configValue: minifyJsonString(content),
						description: "AI Model Options",
						externalReferenceCode: "AI-MODEL-OPTIONS"
					]
				]
			]

			def fileName = String.format("%02d-object-entry-%s.batch-engine-data.json", fileIndex++, configKey)
			def outputFile = new File(batchDir, fileName)
			outputFile.withWriter('UTF-8') {
				writer ->
				writer.write(JsonOutput.prettyPrint(JsonOutput.toJson(batchJson)))

			}
			logger.lifecycle("Generated batch file: ${outputFile.name}")

		}

		// --- Batch Sizes ---
		def batchSizesFile = file("$frontendConfigDir/batch-sizes.json")
		if (batchSizesFile.exists()) {
			def content = batchSizesFile.text
			def configKey = "batch-sizes"

			def batchJson = [
				configuration: [
					className: "com.liferay.object.rest.dto.v1_0.ObjectEntry",
					parameters: [
						containsHeaders: "true",
						createStrategy: "UPSERT",
						onErrorFail: "false",
						taskItemDelegateName: "C_AICommerceAcceleratorConfiguration",
						updateStrategy: "UPDATE"
					],
					taskItemDelegateName: "C_AICommerceAcceleratorConfiguration"
				],
				items: [
					[
						configKey: configKey,
						configStatus: [ key: "Active" ],
						configValue: minifyJsonString(content),
						description: "Batch Sizes",
						externalReferenceCode: "BATCH-SIZES"
					]
				]
			]

			def fileName = String.format("%02d-object-entry-%s.batch-engine-data.json", fileIndex++, configKey)
			def outputFile = new File(batchDir, fileName)
			outputFile.withWriter('UTF-8') {
				writer ->
				writer.write(JsonOutput.prettyPrint(JsonOutput.toJson(batchJson)))

			}
			logger.lifecycle("Generated batch file: ${outputFile.name}")

		}

	}
}

// ======================================================================

def CX_DIR = file(findProperty('cx.dir') ?: "$rootDir/client-extensions/ai-commerce-accelerator-frontend")
def FRAGMENTS_DIR = file(findProperty('fragments.dir') ?: "$rootDir/fragments")
def FRAGMENT_DIR = file(findProperty('fragment.dir') ?: "$rootDir/fragments/ai-commerce-accelerator")

def FRAGMENTS_ZIP_NAME = "ai-accelerator-fragments.zip"
def FRAGMENTS_ZIP_OUT = layout.buildDirectory.dir("fragments")

// Import scope (GLOBAL by default)
def COMPANY_WEB_ID = (findProperty('companyWebId') ?: '*')
def GROUP_KEY = (findProperty('groupKey') ?: null)

// liferay.home (defaults to ./bundles)
def liferayHome = providers.gradleProperty('liferay.home').orElse("$rootDir/bundles")

// Detect package manager
def useYarn = new File(CX_DIR, "yarn.lock").exists()
def useNpmCi = new File(CX_DIR, "package-lock.json").exists()

// Generated files
def GENERATED_FRAGMENT_CSS = layout.buildDirectory.file('tmp/fragment.css')
def GENERATED_DESCRIPTOR = layout.buildDirectory.file('tmp/liferay-deploy-fragments.json')

// Prefer an existing descriptor next to the set if present; fall back to generated
def existingDescriptorCandidates = [
	new File(FRAGMENTS_DIR.parentFile ?: rootDir, 'liferay-deploy-fragments.json'), // sibling to the set
	new File(FRAGMENTS_DIR, 'liferay-deploy-fragments.json')
]
def existingDescriptor = existingDescriptorCandidates.find {
	it.exists()
}

// The source dir that holds the descriptor we will add at ZIP root
def descriptorSourceDirProvider = providers.provider {
	(existingDescriptor ?: GENERATED_DESCRIPTOR.get().asFile).parentFile
}

// Handy: the name of your fragment-set folder inside the ZIP
def FRAGMENT_SET_NAME = FRAGMENTS_DIR.name

// ===================== TASKS =====================

// Helper
tasks.register('printArtifacts') {
	group = 'help'
	doLast {
		println "Fragments ZIP: ${tasks.named('zipFragments').get().archiveFile.get().asFile}"
		println "Deploy dir:    ${liferayHome.get()}/deploy"
		println "Fragment set:  ${FRAGMENT_SET_NAME} (from ${FRAGMENTS_DIR})"
		println "Fragment dir:  ${FRAGMENT_DIR}"
		println "CX dir:        ${CX_DIR}"
		println "Package mgr:   ${useYarn ? 'yarn' : 'npm'}"

	}
}

// --- Install + Build CX with Vite (auto yarn/npm) ---
tasks.register('buildFrontendCX') {
	group = 'build'
	description = "Install deps and build the Import Map CX (${useYarn ? 'yarn' : 'npm'})."
	onlyIf {
		CX_DIR.exists()

	}
	doLast {
		try {
			exec {
				workingDir CX_DIR; commandLine findYarnExecutable(), 'install'
			}
			exec {
				workingDir CX_DIR; commandLine findYarnExecutable(), 'build'
			}
		} catch (Exception e) {
			exec {
				workingDir CX_DIR; commandLine 'npx', 'yarn', 'install'
			}
			exec {
				workingDir CX_DIR; commandLine 'npx', 'yarn', 'build'
			}
		}
	}
}

tasks.register('testFrontendCX') {
	group = 'verification'
	description = "Run tests for the Frontend CX."
	onlyIf {
		CX_DIR.exists()
	}
	doLast {
		try {
			exec {
				workingDir CX_DIR; commandLine findYarnExecutable(), 'test'
			}
		} catch (Exception e) {
			exec {
				workingDir CX_DIR; commandLine 'npx', 'yarn', 'test'
			}
		}
	}
}

