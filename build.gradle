	doLast {
		exec {
			commandLine 'npx', 'playwright', 'test', 'tests/smoke'
		}
	}
}

// --- Generate liferay-deploy-fragments.json if not present ---
tasks.register('generateDeployDescriptor') {
	group = 'build'
	description = 'Create liferay-deploy-fragments.json (if one is not already provided).'
	inputs.property('companyWebId', COMPANY_WEB_ID)
	if (GROUP_KEY != null) inputs.property('groupKey', GROUP_KEY)
	outputs.file(GENERATED_DESCRIPTOR)
	onlyIf {
		(existingDescriptor == null)

	}

	doLast {
		def json = [:]
		if (COMPANY_WEB_ID == '*') {
			json.companyWebId = '*'

		} else {
			json.companyWebId = COMPANY_WEB_ID
			if (GROUP_KEY) json.groupKey = GROUP_KEY

}
		def outFile = GENERATED_DESCRIPTOR.get().asFile
		outFile.parentFile.mkdirs()
		outFile.text = JsonOutput.prettyPrint(JsonOutput.toJson(json))
		logger.lifecycle("Generated descriptor at ${outFile}")

}
}

// --- Produce a stable fragment.css from the built CX CSS (or stub if none) ---
tasks.register('generateFragmentCss') {
				group = 'build'
				description = 'Create build/tmp/fragment.css from the latest CX-built CSS (or a stub).'
				dependsOn tasks.named('printArtifacts')
				dependsOn tasks.named('buildFrontendCX')
				outputs.file(GENERATED_FRAGMENT_CSS)
				doLast {
					def cssDir = new File(CX_DIR, 'build/static')
					def files = cssDir.exists() ? fileTree(cssDir).matching { include '**/*.css' }.files : [] as Set<File>

					def outFile = GENERATED_FRAGMENT_CSS.get().asFile
					outFile.parentFile.mkdirs()

					if (!files || files.isEmpty()) {
						outFile.text = '/* No built CSS found; ensure src/app.scss is imported by src/index.jsx */'
						logger.lifecycle("No CSS emitted by Vite under ${cssDir}; wrote stub fragment.css.")

					} else {
						def latest = files.sort { -it.lastModified() }.first()
						ant.copy(file: latest, tofile: outFile)
						logger.lifecycle("Selected CSS: ${latest.name} -> fragment.css")

					}

				}
			}

			tasks.register('syncFragmentCssToFragment', Copy) {
				group = 'build'
				description = 'Copy build/tmp/fragment.css into the fragment as fragment.css.'
				dependsOn tasks.named('generateFragmentCss')

				from(GENERATED_FRAGMENT_CSS.map { it.asFile })
				into(FRAGMENT_DIR)
				rename {
					'fragment.css'

				}
			}

			tasks.register('zipFragments', Zip) {
				group = 'build'
				description = 'Zip the fragment set with the descriptor at ZIP root.'
				archiveFileName.set(FRAGMENTS_ZIP_NAME)
				destinationDirectory.set(FRAGMENTS_ZIP_OUT)

				dependsOn tasks.named('generateDeployDescriptor')
				dependsOn tasks.named('syncFragmentCssToFragment')

				duplicatesStrategy = DuplicatesStrategy.EXCLUDE

				// Include the entire fragment-set directory AS a top-level folder inside the ZIP:
				// [zip]/[fragment-set-name]/(collection.json + fragment folders)
				from(FRAGMENTS_DIR) {
					include '**/*'
					exclude 'liferay-deploy-fragments.json' // ensure descriptor is only at ZIP root
					into(FRAGMENT_SET_NAME)

				}

				// Include exactly one liferay-deploy-fragments.json at ZIP root
				from(descriptorSourceDirProvider) {
					include 'liferay-deploy-fragments.json'
					// no into() here => placed at ZIP root

				}
			}

			// --- Auto-deploy the ZIP to <liferay.home or ./bundles>/deploy ---
			tasks.register('autoDeployFragments', Copy) {
				group = 'build'
				description = 'Copy the fragments ZIP to the bundle deploy/ folder.'
				dependsOn tasks.named('zipFragments')
				from(tasks.named('zipFragments').flatMap { it.archiveFile })

				doFirst {
					def deployDir = new File(liferayHome.get() + '/deploy')
					if (!deployDir.exists()) deployDir.mkdirs()

}
	into(liferayHome.map { it + '/deploy' })
}

// ===================== LIFECYCLE WIRING =====================
tasks.named('check') {
	dependsOn tasks.named('testAllCX')
}

tasks.named('assemble') {
	dependsOn tasks.named('generateBatchFiles')
	dependsOn tasks.named('zipFragments')
	dependsOn tasks.named('buildConfigurationCX')
}

tasks.matching { it.name == 'deploy' }.configureEach {
	dependsOn tasks.named('testAllCX')
	dependsOn tasks.named('generateBatchFiles')
	dependsOn tasks.named('buildConfigurationCX')
	dependsOn tasks.named('autoDeployFragments')
}