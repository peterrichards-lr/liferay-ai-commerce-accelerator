tasks.register('aggregateTestReports', Copy) {
	group = 'verification'
	description = 'Consolidates all Client Extension test reports into a central directory.'
	
	destinationDir = file("$buildDir/test-results/all-cx")
	
	from('client-extensions/ai-commerce-accelerator-frontend/vitest-report-frontend.xml')
	from('client-extensions/ai-commerce-accelerator-configuration/vitest-report-configuration.xml')
	from('client-extensions/ai-commerce-accelerator-microservice/vitest-report-microservice.xml')
	
	doLast {
		logger.lifecycle("Aggregated test reports are available in ${destinationDir}")
	}
