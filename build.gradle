tasks.register('testAllCX') {
	group = 'verification'
	description = "Run tests for all Client Extensions."
	dependsOn tasks.named('testFrontendCX')
	dependsOn tasks.named('testConfigurationCX')
	dependsOn tasks.named('testMicroserviceCX')
