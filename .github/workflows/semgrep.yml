name: Semgrep SAST

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: Semgrep / scan
    runs-on: ubuntu-latest
    # Non-blocking: surface findings in the Security tab without gating PRs
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep SAST scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/javascript
            p/nodejs
            p/secrets
          # Optional: set SEMGREP_APP_TOKEN secret to upload results to Semgrep Cloud
          # publishToken: ${{ secrets.SEMGREP_APP_TOKEN }}
        env:
          # Suppress telemetry in CI environments
          SEMGREP_SEND_METRICS: 'off'
