name: Release packager (.ldmp)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package:
    name: Package LDM Environment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install and Configure LDM
        run: |
          sudo curl -L https://github.com/peterrichards-lr/liferay-docker-manager/releases/latest/download/ldm-linux -o /usr/local/bin/ldm
          sudo chmod +x /usr/local/bin/ldm
          ldm config set non_interactive true

      - name: Initialize AICA via LDM
        run: |
          ldm import . liferay-ai-commerce-accelerator -y --db postgresql --no-run
          ldm run liferay-ai-commerce-accelerator --sidecar --no-wait -y

      - name: Verify Database Readiness
        run: |
          echo "Waiting for database container to be active..."
          until docker ps | grep -E -q "aica-db|liferay-ai-commerce-accelerator-db"; do
            sleep 2
          done
          echo "Database container is online. Waiting for connection readiness..."

      - name: Package the Populated Workspace
        run: |
          ldm package liferay-ai-commerce-accelerator --use-latest --output ./dist --repo peterrichards-lr/liferay-ai-commerce-accelerator

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/liferay-ai-commerce-accelerator.ldmp
            dist/liferay-ai-commerce-accelerator.ldmp.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
