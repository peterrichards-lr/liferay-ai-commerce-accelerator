name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Update browser baseline data
        run: yarn add -D baseline-browser-mapping@latest -W

      - name: Run Linting
        run: yarn lint

      - name: Run Tests
        run: yarn test

      - name: Install Playwright Browsers
        run: npx playwright install --force

      - name: Run Smoke Tests
        run: yarn smoke
