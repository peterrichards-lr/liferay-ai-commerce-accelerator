name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Rebuild native modules
        run: |
          yarn workspace @liferay/liferay-ai-commerce-accelerator-microservice run pretest
          yarn workspace @liferay/accelerator-sdk run pretest

      - name: Run Prettier Check
        run: yarn prettier --check .
        timeout-minutes: 5

      - name: Run ESLint
        run: yarn workspaces run eslint .
        timeout-minutes: 10

      - name: Run Markdown Lint
        run: yarn lint:md
        timeout-minutes: 5

      - name: Run Unit Tests
        run: yarn test
        timeout-minutes: 15

      # Note: Smoke tests are currently disabled in CI because they require
      # a running Liferay instance. To enable them, configure a mock environment
      # or a live test server.
      # - name: Install Playwright Browsers
      #   run: npx playwright install --with-deps chromium
      #   timeout-minutes: 10
      # - name: Run Smoke Tests
      #   run: yarn smoke
      #   timeout-minutes: 10

  # E2E Verification (Requires Liferay DXP)
  e2e-verification:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Liferay Docker Manager (LDM)
        run: |
          wget https://github.com/peterrichards-lr/liferay-docker-manager/releases/latest/download/ldm-linux -O ldm
          chmod +x ldm
          sudo mv ldm /usr/local/bin/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E Verification
        run: yarn verify
        env:
          LIFERAY_ADMIN_EMAIL: ${{ secrets.LIFERAY_ADMIN_EMAIL }}
          LIFERAY_ADMIN_PASSWORD: ${{ secrets.LIFERAY_ADMIN_PASSWORD }}
          LIFERAY_HOST: http://localhost:8080

      - name: Upload E2E Logs on Failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-logs
          path: |
            logs/
            client-extensions/*/logs/
            test-results/
            playwright-report/
          retention-days: 7
