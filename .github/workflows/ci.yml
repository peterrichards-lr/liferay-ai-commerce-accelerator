name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    name: CI/build-and-test
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Rebuild native modules
        run: |
          yarn workspace @liferay/liferay-ai-commerce-accelerator-microservice run pretest
          yarn workspace @liferay/accelerator-sdk run pretest

      - name: Run Prettier Check
        run: yarn prettier --check .
        timeout-minutes: 5

      - name: Run ESLint
        run: yarn workspaces run eslint .
        timeout-minutes: 10

      - name: Run Markdown Lint
        run: yarn lint:md
        timeout-minutes: 5

      - name: Run Dependency Security Audit
        run: 'yarn audit --summary || echo "⚠️ Warning - Security vulnerabilities detected. Please run ''yarn audit'' locally to inspect."'
        timeout-minutes: 5

      - name: Build Workspace and Client Extensions
        run: ./gradlew build -x test
        timeout-minutes: 10

      - name: Run Unit Tests
        run: yarn test
        timeout-minutes: 15
