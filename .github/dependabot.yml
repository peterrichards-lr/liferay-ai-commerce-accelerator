version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 10
    versioning-strategy: increase
    groups:
      dependencies:
        patterns:
          - '*'
    ignore:
      - dependency-name: 'codemirror'
  - package-ecosystem: 'npm'
    directory: '/client-extensions/ai-commerce-accelerator-microservice'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 10
  - package-ecosystem: 'npm'
    directory: '/client-extensions/ai-commerce-accelerator-frontend'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 10
  - package-ecosystem: 'npm'
    directory: '/client-extensions/ai-commerce-accelerator-configuration'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 10
