name: Bug Report
description: Report a bug to help us improve AICA
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: dropdown
    id: liferay_version
    attributes:
      label: Liferay CE/DXP Version
      description: What Liferay version is the target environment running?
      options:
        - Liferay DXP 2025.Q1
        - Liferay DXP 2024.Qx
        - Liferay DXP 7.4
        - Liferay Portal CE 7.4
        - Not Applicable / General CLI Issue
    validations:
      required: true
  - type: dropdown
    id: environment_type
    attributes:
      label: Environment Type
      description: How is the environment provisioned?
      options:
        - Docker Compose (via LDM)
        - Native OSGi Bundle / Local Tomcat
        - Liferay Cloud (PaaS)
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Please describe how we can reproduce the bug.
      placeholder: |
        1. Run `node scripts/aica-cli.cjs generate`
        2. See error...
    validations:
      required: true
  - type: textarea
    id: debug_logs
    attributes:
      label: Verbose Debug Logs
      description: Please paste/attach verbose debug logs (e.g., from running the CLI with `-v` or using `LOG_LEVEL=debug`).
      render: shell
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Anything else we should know?
